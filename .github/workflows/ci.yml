name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: [ '1.23.x' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Determine Go module cache path
        id: go-cache
        shell: bash
        run: echo "gomodcache=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ${{ steps.go-cache.outputs.gomodcache }}
          key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go }}-

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v

  composer-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Composer audit (root)
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist --no-progress
            composer audit
          fi

      - name: Composer install and audit (php/)
        run: |
          if [ -f php/composer.json ]; then
            cd php && composer install --no-interaction --prefer-dist --no-progress && composer audit
          fi

      - name: PHPUnit (php/)
        run: |
          if [ -f php/composer.json ] && [ -d php/vendor/bin ]; then
            cd php && ./vendor/bin/phpunit
          fi
